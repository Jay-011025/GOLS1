<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intake Portal | GOLS</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="nav-container">
            <a href="index.html" class="logo">GOLS<span>.</span></a>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="services.html">Services</a>
                <a href="linguistica-lab.html">Linguistica Lab</a>
                <a href="contact.html" class="active cta-btn">Intake Portal</a>
            </nav>
        </div>
    </header>

    <main class="wrapper" style="max-width: 800px;">
        <div class="card" style="padding: 4rem;">
            <h1 class="mb-2" style="font-size: 2.2rem;">Initialize a Project</h1>
            <p style="color: var(--text-muted); margin-bottom: 3rem;">Submit your documentation parameters or language acquisition goals below. We will review the scope and reply within 24 hours.</p>

            <!-- Web3Forms Secure Endpoint -->
            <form action="https://api.web3forms.com/submit" method="POST">
                
                <!-- REPACE THIS WITH YOUR WEB3FORMS KEY -->
                <input type="hidden" name="access_key" value="YOUR_ACCESS_KEY_HERE">
                
                <input type="hidden" name="subject" value="New GOLS Client Inquiry">
                <input type="checkbox" name="botcheck" style="display: none;">

                <div class="form-group">
                    <label for="name">Full Name / Organization</label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="service">Service Required</label>
                    <select id="service" name="service" style="width: 100%; padding: 1rem; background: var(--bg-dark); border: 1px solid var(--border-color); border-radius: 8px; color: #fff; font-family: inherit;">
                        <option value="Sworn Translation">Sworn Translation (French/Creole)</option>
                        <option value="Language Coaching">Language Acquisition Track</option>
                        <option value="AI Pedagogy">AI Pedagogy Consulting</option>
                        <option value="Other">Other Inquiry</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="message">Project Scope & Timeline</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                </div>

                <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Transmit Request</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Garden of Languages and services (GOLS). All rights reserved globally.</p>
    </footer>
</body>
</html>
